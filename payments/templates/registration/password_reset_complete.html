{% extends "payments/base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 text-center">
    <div class="card shadow-sm border-0">
      <div class="card-body py-5">
        <div class="display-1 text-success mb-3">&#10003;</div>
        <h1 class="fw-bold mb-3">Password Reset Complete</h1>
        <p class="lead text-muted">Your password has been set. You can now sign in.</p>
        <a href="{% url 'login' %}" class="btn btn-sc-primary mt-3">Sign In</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
