steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_IMAGE_NAME
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_IMAGE_NAME
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_IMAGE_NAME
      - --region=$_REGION
      - --allow-unauthenticated
images:
  - $_IMAGE_NAME

substitutions:
  _SERVICE_NAME: silva-activity-portal
  _REGION: europe-west2
  _IMAGE_NAME: europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/silva-activity-portal
